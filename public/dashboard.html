<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Secure Resume Builder</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #eef4fa;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #1e3a5f;
      text-align: center;
    }

    .subtext {
      text-align: center;
      margin-bottom: 20px;
      color: #475569;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      background-color: #2f6fd6;
      color: #ffffff;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #2458ab;
    }

    .logout-btn {
      background-color: #d14848;
    }

    .logout-btn:hover {
      background-color: #aa3333;
    }

    .card {
      background-color: #f8fbff;
      border: 1px solid #dbe7f5;
      border-radius: 10px;
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    input:focus {
      outline: none;
      border-color: #5b8def;
    }

    .result {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      color: #0f766e;
      font-weight: bold;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>
    <p class="subtext" id="welcomeText">Welcome!</p>

    <div class="actions">
      <button id="createResumeBtn">Create Resume</button>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <section class="card">
      <label for="processInput">Enter a string (skills, name, etc.)</label>
      <input id="processInput" type="text" placeholder="Type something here" />
      <button id="processBtn">Process</button>
      <div id="result" class="result"></div>
    </section>
  </div>

  <script>
    const welcomeText = document.getElementById('welcomeText');
    const createResumeBtn = document.getElementById('createResumeBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const processBtn = document.getElementById('processBtn');
    const processInput = document.getElementById('processInput');
    const resultBox = document.getElementById('result');

    const userEmail = localStorage.getItem('userEmail');

    if (!userEmail) {
      window.location.href = '/index.html';
    } else {
      welcomeText.textContent = 'Welcome, ' + userEmail;
    }

    createResumeBtn.addEventListener('click', function () {
      window.location.href = '/resume.html';
    });

    processBtn.addEventListener('click', async function () {
      const inputValue = processInput.value.trim();
      const userId = localStorage.getItem('userId');

      if (!inputValue) {
        resultBox.style.color = '#b91c1c';
        resultBox.textContent = 'Please enter a value first.';
        return;
      }

      try {
        const response = await fetch('/api/util', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            userId: userId,
            inputString: inputValue
          })
        });

        const data = await response.json();

        if (!response.ok) {
          resultBox.style.color = '#b91c1c';
          resultBox.textContent = data.message || 'Failed to process input';
          return;
        }

        resultBox.style.color = '#0f766e';
        resultBox.textContent = 'Processed Result: ' + data.result;
      } catch (error) {
        resultBox.style.color = '#b91c1c';
        resultBox.textContent = 'Network error while processing input.';
      }
    });

    logoutBtn.addEventListener('click', function () {
      localStorage.removeItem('userId');
      localStorage.removeItem('userEmail');
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
